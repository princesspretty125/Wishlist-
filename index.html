<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Bòi Bói Boi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
              apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.firebasestorage.app",
  messagingSenderId: "821194575297",
  appId: "1:821194575297:web:185b7837e6cdee4783f340",
  measurementId: "G-RHE1QBW9WX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const giftCol = collection(db, "gifts");

        window.currentPrio = 'Muốn lắm';
        window.selectPrio = (prio, btn) => {
            window.currentPrio = prio;
            document.querySelectorAll('.prio-btn').forEach(b => {
                b.classList.remove('border-pink-500', 'bg-[#3a2226]', 'text-white');
                b.classList.add('border-[#333]', 'bg-[#2a2a2a]', 'text-gray-400');
            });
            btn.classList.add('border-pink-500', 'bg-[#3a2226]', 'text-white');
            btn.classList.remove('text-gray-400');
        };

        window.addGift = async () => {
            const name = document.getElementById('gName').value;
            const price = document.getElementById('gPrice').value;
            if(!name || !price) return alert("Điền đủ tên và giá mới được nha!");
            await addDoc(giftCol, { name, price, prio: window.currentPrio, date: new Date() });
            document.getElementById('gName').value = '';
            document.getElementById('gPrice').value = '';
        };

        onSnapshot(query(giftCol, orderBy("date", "desc")), (s) => {
            const div = document.getElementById('list');
            div.innerHTML = '';
            s.forEach(d => {
                const i = d.data();
                div.innerHTML += `<div class="bg-[#1a1a1a] p-4 rounded-2xl mb-3 flex justify-between items-center border border-[#222]">
                    <div><div class="font-bold text-white text-sm">${i.name}</div><div class="text-[10px] text-pink-400">Ưu tiên: ${i.prio}</div></div>
                    <div class="text-yellow-500 font-bold text-sm">${Number(i.price).toLocaleString()}đ</div>
                </div>`;
            });
        });
    </script>
</head>
<body class="bg-[#0c0c0c] text-white p-5 font-sans select-none">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-pink-300">🌹 Wishlist của Bòi Bói Boi🫃🏻</h1>
            <p class="text-gray-500 text-[11px] mt-1 font-medium">Thêm món quà anh thích vào đây nhoéeeee 💌</p>
        </div>

        <div class="bg-[#161616] p-6 rounded-[35px] border border-[#222] space-y-5 shadow-2xl">
            <div>
                <p class="text-pink-300 text-[9px] font-bold mb-2 tracking-widest uppercase">💖 Tên quà tặng</p>
                <input id="gName" class="w-full bg-[#222] p-3 rounded-xl border border-[#333] outline-none text-sm focus:border-pink-500 transition-all placeholder:text-gray-600" placeholder="Ví dụ: Vòng tay bạc khắc tên...">
            </div>
            
            <div>
                <p class="text-pink-300 text-[9px] font-bold mb-2 tracking-widest uppercase">💰 Giá ước tính (VNĐ)</p>
                <input id="gPrice" type="number" class="w-full bg-[#222] p-3 rounded-xl border border-[#333] outline-none text-sm focus:border-pink-500 transition-all placeholder:text-gray-600" placeholder="500,000">
            </div>

            <div>
                <p class="text-pink-300 text-[9px] font-bold mb-2 tracking-widest uppercase">Độ ưu tiên</p>
                <div class="grid grid-cols-5 gap-1">
                    <button onclick="selectPrio('Ước thôi', this)" class="prio-btn py-2 rounded-xl border border-[#333] bg-[#2a2a2a] text-[8px] text-gray-400 transition-all flex flex-col items-center"><span>💬</span>Ước thôi</button>
                    <button onclick="selectPrio('Thích nha', this)" class="prio-btn py-2 rounded-xl border border-[#333] bg-[#2a2a2a] text-[8px] text-gray-400 transition-all flex flex-col items-center"><span>🌹</span>Thích nha</button>
                    <button onclick="selectPrio('Muốn lắm', this)" class="prio-btn py-2 rounded-xl border border-pink-500 bg-[#3a2226] text-[8px] text-white transition-all flex flex-col items-center"><span>🥺</span>Muốn lắm</button>
                    <button onclick="selectPrio('Cần rồi', this)" class="prio-btn py-2 rounded-xl border border-[#333] bg-[#2a2a2a] text-[8px] text-gray-400 transition-all flex flex-col items-center"><span>💕</span>Cần rồi</button>
                    <button onclick="selectPrio('Phải có', this)" class="prio-btn py-2 rounded-xl border border-[#333] bg-[#2a2a2a] text-[8px] text-gray-400 transition-all flex flex-col items-center"><span>🔥</span>Phải có</button>
                </div>
            </div>

            <button onclick="addGift()" class="w-full bg-pink-500 hover:bg-pink-600 py-4 rounded-full font-bold text-sm shadow-lg shadow-pink-500/20 active:scale-95 transition-all mt-2">
                Thêm vào danh sách ước mơ ❤️
            </button>
        </div>

        <div class="mt-10">
            <h2 class="text-sm font-bold text-gray-400 mb-4 border-b border-[#222] pb-2">📋 Danh sách đã lưu:</h2>
            <div id="list"></div>
        </div>
    </div>
</body>
</html>
