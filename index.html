<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bòi Bói Boi - Done List 🫃🏻</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #000; --pink: #ff2d55; --card: #1c1c1e; --gray: #8e8e93; --green: #34c759; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        .tab-menu { display: flex; justify-content: center; gap: 40px; padding: 20px 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 0.5px solid #333; }
        .tab-link { color: var(--gray); font-weight: 800; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .tab-link.active { color: var(--pink); border-bottom: 2px solid var(--pink); padding-bottom: 5px; }

        .slider { display: flex; width: 200vw; transition: transform 0.4s ease; }
        .sheet { width: 100vw; padding: 20px; box-sizing: border-box; min-height: 100vh; }

        .input-card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #333; margin-bottom: 30px; }
        input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 12px; padding: 14px; color: #fff; margin-bottom: 10px; outline: none; box-sizing: border-box; font-size: 16px; }
        
        .p-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .p-btn { background: #2c2c2e; border: 1px solid #3a3a3c; padding: 12px; border-radius: 12px; color: var(--gray); font-weight: 600; cursor: pointer; }
        .p-btn.active { border-color: var(--pink); color: #fff; background: rgba(255, 45, 85, 0.2); }

        .add-btn { width: 100%; background: #fff; color: #000; border: none; padding: 18px; border-radius: 40px; font-weight: 900; font-size: 16px; cursor: pointer; }
        
        h2 { font-size: 18px; font-weight: 900; margin: 30px 0 15px; padding-left: 10px; border-left: 4px solid var(--pink); }
        .done-title { border-left-color: var(--green); color: var(--green); opacity: 0.8; }

        .item { background: var(--card); padding: 16px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #333; transition: 0.3s; }
        .item.is-done { opacity: 0.4; filter: grayscale(0.8); border-left-color: var(--green) !important; }
        
        .badge { font-size: 9px; padding: 3px 8px; border-radius: 6px; color: #fff; font-weight: 800; margin-bottom: 5px; display: inline-block; }
        .actions { display: flex; gap: 8px; }
        .btn-circle { width: 40px; height: 40px; border-radius: 50%; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #2c2c2e; }
        .btn-done { color: var(--green); border: 1px solid var(--green); }

        .img-preview { width: 80px; height: 80px; background: #2c2c2e; border-radius: 12px; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="tab-menu">
    <div class="tab-link active" onclick="go(0, this)">🎁 QUÀ TẶNG</div>
    <div class="tab-link" onclick="go(1, this)">🍜 ĂN UỐNG</div>
</div>

<div class="slider" id="slider">
    <div class="sheet">
        <div class="input-card">
            <input type="text" id="n1" placeholder="Tên món quà ước mơ...">
            <input type="text" id="p1" placeholder="Giá tiền..." onkeyup="fVN(this)">
            <div class="p-group">
                <button class="p-btn" onclick="setP(5, this)">🔥 PHẢI CÓ</button>
                <button class="p-btn" onclick="setP(2, this)">💖 THÍCH</button>
            </div>
            <button class="add-btn" onclick="save('gifts')">✨ THÊM VÀO ƯỚC MƠ</button>
        </div>
        <h2 id="anc1">🔥 ĐANG CHỜ HỐT</h2>
        <div id="list1-active"></div>
        <h2 class="done-title">💃 ĐÃ VỀ DINH</h2>
        <div id="list1-done"></div>
    </div>

    <div class="sheet">
        <div class="input-card">
            <input type="text" id="n2" placeholder="Tên món thèm ăn...">
            <div class="img-preview" onclick="document.getElementById('fInp').click()">
                <img id="pImg" style="display:none"> <span id="pTxt" style="font-size:10px">+ ẢNH</span>
            </div>
            <input type="file" id="fInp" hidden accept="image/*" onchange="readImg(this)">
            <input type="text" id="p2" placeholder="Giá dự kiến..." onkeyup="fVN(this)">
            <div class="p-group">
                <button class="p-btn" onclick="setP(5, this)">🔥 PHẢI ĂN</button>
                <button class="p-btn" onclick="setP(2, this)">😋 THÈM</button>
            </div>
            <button class="add-btn" onclick="save('foods')">🤤 CHỐT ĐƠN</button>
        </div>
        <h2 id="anc2">🍤 ĐANG THÈM THUỒNG</h2>
        <div id="list2-active"></div>
        <h2 class="done-title">✅ ĐÃ CHÉN XONG</h2>
        <div id="list2-done"></div>
    </div>
</div>

<script>
    const conf = {
        apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.firebasestorage.app",
  messagingSenderId: "821194575297",
  appId: "1:821194575297:web:185b7837e6cdee4783f340",
  measurementId: "G-RHE1QBW9WX"
    };
    firebase.initializeApp(conf);
    const db = firebase.database();
    let curP = null, curImg = "";

    function go(idx, b) {
        document.getElementById('slider').style.transform = `translateX(-${idx * 100}vw)`;
        document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
        b.classList.add('active');
    }

    function setP(lv, b) {
        b.parentElement.querySelectorAll('.p-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        curP = { lv: lv, txt: b.innerText, clr: lv==5?'#ff3b30':'#ffcc00' };
    }

    function fVN(i) {
        let v = i.value.replace(/\D/g, "");
        i.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function readImg(input) {
        if (input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => {
                document.getElementById('pImg').src = e.target.result;
                document.getElementById('pImg').style.display = 'block';
                document.getElementById('pTxt').style.display = 'none';
                curImg = e.target.result;
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function save(path) {
        const isG = path === 'gifts';
        const name = document.getElementById(isG ? 'n1' : 'n2').value;
        if (!name || !curP) return alert("Nhập đủ thông tin bà ơi!");

        db.ref(path).push({
            name, price: document.getElementById(isG ? 'p1' : 'p2').value || "0",
            p: curP, img: isG ? "" : curImg, status: 'active', time: Date.now()
        }).then(() => {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
            document.getElementById(isG ? 'n1' : 'n2').value = "";
            document.getElementById(isG ? 'p1' : 'p2').value = "";
            curP = null; curImg = "";
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('pImg').style.display='none';
            document.getElementById('pTxt').style.display='block';
        });
    }

    function toggleStatus(path, id, currentStatus) {
        const newStatus = currentStatus === 'active' ? 'done' : 'active';
        db.ref(`${path}/${id}`).update({ status: newStatus });
        if(newStatus === 'done') confetti({ particleCount: 50, colors: ['#34c759'] });
    }

    function render(path, activeId, doneId) {
        db.ref(path).on('value', (snap) => {
            const activeCont = document.getElementById(activeId);
            const doneCont = document.getElementById(doneId);
            let activeHtml = "", doneHtml = "";
            const items = [];
            
            snap.forEach(c => { items.push({id: c.key, ...c.val()}); });
            items.sort((a, b) => b.p.lv - a.p.lv || b.time - a.time);

            items.forEach(i => {
                const html = `
                <div class="item ${i.status === 'done' ? 'is-done' : ''}" style="border-left-color:${i.p.clr}">
                    <div style="flex:1">
                        <span class="badge" style="background:${i.p.clr}">${i.p.txt}</span>
                        ${i.img ? `<img src="${i.img}" style="width:70px; border-radius:10px; display:block; margin:5px 0;">` : ''}
                        <h3 style="margin:5px 0; font-size:16px;">${i.name}</h3>
                        <p style="font-size:12px; color:var(--gray);">${i.price}đ</p>
                    </div>
                    <div class="actions">
                        <button class="btn-circle btn-done" onclick="toggleStatus('${path}','${i.id}','${i.status}')">
                            ${i.status === 'active' ? (path==='gifts'?'💃':'✅') : '↩️'}
                        </button>
                        <button class="btn-circle" onclick="db.ref('${path}/${i.id}').remove()">🗑️</button>
                    </div>
                </div>`;
                if(i.status === 'active') activeHtml += html; else doneHtml += html;
            });

            activeCont.innerHTML = activeHtml || "<p style='font-size:12px;color:#333;text-align:center'>Trống trơn...</p>";
            doneCont.innerHTML = doneHtml || "<p style='font-size:12px;color:#333;text-align:center'>Chưa hoàn thành món nào...</p>";
        });
    }

    render('gifts', 'list1-active', 'list1-done');
    render('foods', 'list2-active', 'list2-done');
</script>
</body>
</html>
