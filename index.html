<!DOCTYPE html>
<html lang="vi">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>Wishlist Bòi Bói Boi</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
   <style>
       @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
       body { background-color: #0c0c0c; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; scroll-behavior: smooth; }
       ::placeholder { color: #555 !important; opacity: 0.8; }
       @keyframes btn-jump {
           0% { transform: scale(1); }
           40% { transform: scale(1.4) translateY(-20px); filter: brightness(2); }
           60% { transform: scale(0.85) translateY(5px); }
           100% { transform: scale(1); }
       }
       .jump-active { animation: btn-jump 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
       @keyframes highlight-glow {
           0% { border-color: #ec4899; box-shadow: 0 0 50px rgba(236, 72, 153, 0.6); background: #31161a; }
           100% { border-color: rgba(255,255,255,0.05); box-shadow: none; background: #161616; }
       }
       .new-item-glow { animation: highlight-glow 1.5s ease-out forwards; border: 2px solid #ec4899 !important; }
       @keyframes shake {
           0%, 100% { transform: translateX(0); }
           25% { transform: translateX(-5px); }
           75% { transform: translateX(5px); }
       }
       .error-shake { animation: shake 0.2s ease-in-out 0s 2; border-color: #ef4444 !important; }
       .prio-btn { transition: all 0.2s ease; }
   </style>
   <script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
       import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

       const firebaseConfig = {
           apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.firebasestorage.app",
  messagingSenderId: "821194575297",
  appId: "1:821194575297:web:185b7837e6cdee4783f340",
  measurementId: "G-RHE1QBW9WX"
      };

       const app = initializeApp(firebaseConfig);
       const db = getFirestore(app);
       const giftCol = collection(db, "gifts");
       let lastAddedId = null;
       const scores = { 'Phải có': 5, 'Cần rồi': 4, 'Muốn lắm': 3, 'Thích nha': 2, 'Ước thôi': 1 };

       window.currentPrio = 'Muốn lắm';
       window.selectPrio = (prio, btn) => {
           window.currentPrio = prio;
           document.querySelectorAll('.prio-btn').forEach(b => {
               b.classList.remove('border-pink-500', 'bg-[#3a2226]', 'text-white');
               b.classList.add('border-[#333]', 'bg-[#2a2a2a]', 'text-gray-400');
           });
           btn.classList.add('border-pink-500', 'bg-[#3a2226]', 'text-white');
       };

       window.formatCurrency = (input) => {
           let v = input.value.replace(/\D/g, "");
           input.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
       };

       const triggerBoom = (element) => {
           const rect = element.getBoundingClientRect();
           const x = (rect.left + rect.width / 2) / window.innerWidth;
           const y = (rect.top + rect.height / 2) / window.innerHeight;
           confetti({
               particleCount: 150, spread: 70, origin: { x, y },
               shapes: [confetti.shapeFromText({ text: '🎁', scalar: 3 })],
               colors: ['#f472b6', '#ec4899', '#ffffff']
           });
       };

       window.addGift = async () => {
           const btn = document.getElementById('mainAddBtn');
           const n = document.getElementById('gName'), p = document.getElementById('gPrice'),
                 c = document.getElementById('gCate'), l = document.getElementById('gLink'), nt = document.getElementById('gNote');
           
           if(!n.value.trim()) {
               n.classList.add('error-shake');
               setTimeout(() => n.classList.remove('error-shake'), 400);
               return;
           }

           btn.classList.remove('jump-active');
           void btn.offsetWidth;
           btn.classList.add('jump-active');
           triggerBoom(btn);

           try {
               const res = await addDoc(giftCol, {
                   name: n.value.trim(),
                   cate: c.value,
                   price: (p.value || "0").replace(/,/g, ""),
                   link: l.value.trim(),
                   note: nt.value.trim(),
                   prio: window.currentPrio,
                   bought: false,
                   date: serverTimestamp()
               });
               lastAddedId = res.id;
               n.value = ''; p.value = ''; l.value = ''; nt.value = '';
           } catch (e) { console.error(e); }
       };

       window.toggleBought = (id, s) => updateDoc(doc(db, "gifts", id), { bought: !s });
       window.deleteGift = (id) => confirm("Xoá món này nha?") && deleteDoc(doc(db, "gifts", id));

       onSnapshot(query(giftCol, orderBy("date", "desc")), (s) => {
           const list = document.getElementById('list');
           let data = [];
           s.forEach(d => {
               const item = d.data();
               if (item.date) data.push({ id: d.id, ...item });
           });
           
           data.sort((a, b) => {
               const scoreDiff = scores[b.prio] - scores[a.prio];
               if (scoreDiff !== 0) return scoreDiff;
               return (b.date?.toMillis() || 0) - (a.date?.toMillis() || 0);
           });

           list.innerHTML = '';
           data.forEach(i => {
               list.innerHTML += `
               <div id="item-${i.id}" class="bg-[#161616] p-5 rounded-[25px] mb-4 border ${i.bought ? 'border-green-900 opacity-40' : 'border-white/5'} transition-all shadow-xl">
                   <div class="flex justify-between items-start">
                       <div class="flex-1">
                           <div class="font-bold text-sm ${i.bought ? 'line-through text-gray-500' : 'text-white'}">${i.name}</div>
                           <div class="flex gap-2 mt-2">
                               <span class="text-[9px] bg-[#222] px-2 py-0.5 rounded text-gray-400 font-bold uppercase">${i.cate}</span>
                               <span class="text-[9px] text-pink-400 font-bold uppercase">${i.prio}</span>
                           </div>
                           ${i.note ? `<div class="text-[10px] text-gray-400 mt-2 bg-black/40 p-2 rounded-lg border border-white/5 italic">📝 ${i.note}</div>` : ''}
                           ${i.link ? `<a href="${i.link}" target="_blank" class="text-pink-500 text-[10px] underline mt-3 block font-bold uppercase tracking-tight">🔗 Link sản phẩm</a>` : ''}
                       </div>
                       <div class="text-yellow-500 font-bold text-sm ml-2">${Number(i.price).toLocaleString()}đ</div>
                   </div>
                   <div class="flex justify-end gap-5 mt-4 pt-4 border-t border-white/5">
                       <button onclick="toggleBought('${i.id}', ${i.bought})" class="text-[10px] font-bold ${i.bought ? 'text-gray-400' : 'text-green-500'} uppercase">${i.bought ? 'Hoàn tác' : 'Đã mua ✅'}</button>
                       <button onclick="deleteGift('${i.id}')" class="text-[10px] font-bold text-red-500 uppercase">Xoá 🗑️</button>
                   </div>
               </div>`;
           });

           if (lastAddedId) {
               setTimeout(() => {
                   const el = document.getElementById(`item-${lastAddedId}`);
                   if (el) {
                       el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                       el.classList.add('new-item-glow');
                       lastAddedId = null;
                   }
               }, 300);
           }
       });
   </script>
</head>
<body class="p-4 pb-24">
   <div class="max-w-md mx-auto">
       <div class="text-center mb-10 pt-6">
           <h1 class="text-2xl font-black text-pink-500 uppercase tracking-tighter">🌹 Wishlist Của Bòi Bói Boi 🫄</h1>
           <p class="text-gray-400 text-xs italic mt-2">Thêm món quà anh thích vào đây nhoéee💌/p>
       </div>
       <div class="bg-[#161616] p-7 rounded-[40px] border border-white/5 space-y-6 shadow-2xl">
           <div>
               <p class="text-pink-300 text-[9px] font-bold mb-2 uppercase tracking-widest">💖 Tên quà tặng (Bắt buộc)</p>
               <input id="gName" class="w-full bg-[#222] p-4 rounded-2xl outline-none text-sm text-white focus:border-pink-500 border border-transparent transition-all" placeholder="Nhập tên món quà...">
           </div>
           <div>
               <p class="text-pink-300 text-[9px] font-bold mb-2 uppercase tracking-widest">🏷️ Danh mục</p>
               <select id="gCate" class="w-full bg-[#222] p-4 rounded-2xl outline-none text-sm text-white focus:border-pink-500 border border-transparent">
                   <option value="🎮 Gaming">🎮 Gaming / Tech</option>
                   <option value="👕 Thời trang">👕 Thời trang / Phụ kiện</option>
                   <option value="⚽ Thể thao">⚽ Thể thao / Sức khỏe</option>
                   <option value="🏠 Đồ dùng">🏠 Đồ dùng hàng ngày</option>
               </select>
           </div>
           <div>
               <p class="text-pink-300 text-[9px] font-bold mb-2 uppercase tracking-widest">💰 Giá ước tính (VNĐ)</p>
               <input id="gPrice" type="text" oninput="formatCurrency(this)" class="w-full bg-[#222] p-4 rounded-2xl outline-none text-sm text-white focus:border-pink-500 border border-transparent font-mono" placeholder="Ví dụ: 1,500,000">
           </div>
           <div>
               <p class="text-pink-300 text-[9px] font-bold mb-2 uppercase tracking-widest">🔗 Link tham khảo</p>
               <input id="gLink" class="w-full bg-[#222] p-4 rounded-2xl outline-none text-sm text-white focus:border-pink-500 border border-transparent" placeholder="Dán link sản phẩm...">
           </div>
           <div>
               <p class="text-pink-300 text-[9px] font-bold mb-3 uppercase tracking-widest">Độ ưu tiên</p>
               <div class="grid grid-cols-5 gap-1.5">
                   <button onclick="selectPrio('Ước thôi', this)" class="prio-btn py-3 rounded-xl border border-[#333] bg-[#2a2a2a] text-[8px] text-gray-400 flex flex-col items-center">💬<br>Ước thôi</button>
                   <button onclick="selectPrio('Thích nha', this)" class="prio-btn py-3 rounded-xl border border-[#333] bg-[#2a2a2a] text-[8px] text-gray-400 flex flex-col items-center">🌹<br>Thích nha</button>
                   <button onclick="selectPrio('Muốn lắm', this)" class="prio-btn py-3 rounded-xl border border-pink-500 bg-[#3a2226] text-[8px] text-white flex flex-col items-center shadow-lg">🥺<br>Muốn lắm</button>
                   <button onclick="selectPrio('Cần rồi', this)" class="prio-btn py-3 rounded-xl border border-[#333] bg-[#2a2a2a] text-[8px] text-gray-400 flex flex-col items-center">💕<br>Cần rồi</button>
                   <button onclick="selectPrio('Phải có', this)" class="prio-btn py-3 rounded-xl border border-[#333] bg-[#2a2a2a] text-[8px] text-gray-400 flex flex-col items-center">🔥<br>Phải có</button>
               </div>
           </div>
           <div>
               <p class="text-pink-300 text-[9px] font-bold mb-2 uppercase tracking-widest">🗒️ Ghi chú chi tiết</p>
               <input id="gNote" class="w-full bg-[#222] p-4 rounded-2xl outline-none text-sm text-white focus:border-pink-500 border border-transparent" placeholder="Màu sắc, kích thước, lưu ý thêm...">
           </div>
           <button id="mainAddBtn" onclick="addGift()" class="w-full bg-gradient-to-r from-pink-500 to-rose-600 py-6 rounded-[35px] font-bold text-sm shadow-xl mt-4 uppercase tracking-[0.2em] text-white">
               + Thêm món quà ❤️
           </button>
       </div>
       <div class="mt-16">
           <h2 class="text-[10px] font-bold text-gray-500 mb-8 border-b border-white/5 pb-3 uppercase tracking-widest">🧚‍♀️ Danh sách ước mơ</h2>
           <div id="list" class="space-y-1"></div>
       </div>
   </div>
</body>
</html>
