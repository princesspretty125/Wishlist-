<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist Realtime</title>

<style>
body{
  font-family: Arial;
  background:#fff0f5;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

h2{text-align:center}

input,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  background:#ff69b4;
  color:white;
  font-weight:bold;
  border:none;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag{
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #ccc;
  cursor:pointer;
  font-size:13px;
}

.tag.active{
  background:#ff69b4;
  color:white;
}

.item{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  position:relative;
}

.priority{
  font-size:12px;
  opacity:0.7;
}

.delete{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>💗 Wishlist Realtime</h2>

<input id="name" placeholder="Nhập món muốn thêm...">

<div class="tags">
  <div class="tag">💭 Đang fomo</div>
  <div class="tag">🌷 Thích nha</div>
  <div class="tag">🥺 Muốn lắm lắm</div>
  <div class="tag">💗 Cần rồi</div>
  <div class="tag">🔥 Phải có</div>
</div>

<button onclick="addItem()">Thêm</button>

<div id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig  = {
  apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.firebasestorage.app",
  messagingSenderId: "821194575297",
  appId: "1:821194575297:web:185b7837e6cdee4783f340",
  measurementId: "G-RHE1QBW9WX"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selectedTag = "";

// chọn tag
document.querySelectorAll('.tag').forEach(tag=>{
  tag.onclick = () => {
    document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));
    tag.classList.add('active');
    selectedTag = tag.innerText;

    if(navigator.vibrate){
      navigator.vibrate(30);
    }
  }
});

// ➕ thêm item
function addItem(){
  const name = document.getElementById("name").value;
  if(!name || !selectedTag) return;

  db.ref("wishlist").push({
    name,
    priority: selectedTag
  });

  document.getElementById("name").value = "";
}

// 🗑️ xoá
function deleteItem(id){
  db.ref("wishlist/" + id).remove();
}

// 👀 realtime
db.ref("wishlist").on("value", (snap)=>{
  const data = snap.val();
  const list = document.getElementById("list");

  list.innerHTML = "";

  for(let id in data){
    const item = data[id];

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="delete" onclick="deleteItem('${id}')">❌</div>
      <div>${item.name}</div>
      <div class="priority">${item.priority}</div>
    `;

    list.prepend(div);
  }
});

</script>

</body>
</html>
