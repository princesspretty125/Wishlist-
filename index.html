<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bói Bói Boi 🫃🏻 - The Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.firebasestorage.app",
  messagingSenderId: "821194575297",
  appId: "1:821194575297:web:185b7837e6cdee4783f340",
  measurementId: "G-RHE1QBW9WX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wishlistRef = ref(db, 'gifts');
        const foodRef = ref(db, 'foods');

        let giftP = 1; let foodP = 1; let base64FoodImage = "";

        // Format tiền có dấu phẩy
        const formatMoney = (v) => v ? v.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") : "0";
        
        // Tính thời gian tương đối (Vừa xong, 5 phút trước...)
        const timeAgo = (date) => {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "Vừa xong";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes} phút trước`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} giờ trước`;
            return new Date(date).toLocaleDateString('vi-VN');
        };

        // Gõ đến đâu format đến đó
        window.inputFormat = (el) => {
            let val = el.value.replace(/\D/g, "");
            el.value = formatMoney(val);
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            event.currentTarget.classList.add('active-tab');
        };

        window.selectGiftP = (v) => {
            giftP = v;
            document.querySelectorAll('.gift-p-btn').forEach(b => b.classList.remove('active-gift-p'));
            document.getElementById('gp-'+v).classList.add('active-gift-p');
        };

        window.addGift = () => {
            const name = document.getElementById('gName').value;
            const price = document.getElementById('gPrice').value.replace(/,/g, '');
            if(!name) return;
            confetti({ particleCount: 70, spread: 100, origin: { y: 0.8 }, shapes: [confetti.shapeFromText({ text: '🎁', scalar: 3 })] });
            push(wishlistRef, { name, category: document.getElementById('gCat').value, price, link: document.getElementById('gLink').value, priority: parseInt(giftP), status: 'pending', createdAt: Date.now() });
            ['gName', 'gPrice', 'gLink'].forEach(id => document.getElementById(id).value = "");
            selectGiftP(1);
        };

        onValue(wishlistRef, (s) => {
            const container = document.getElementById('wList'); container.innerHTML = "";
            const data = s.val(); if(!data) return;
            const items = Object.keys(data).map(k => ({id: k, ...data[k]})).sort((a,b) => b.priority - a.priority);
            
            const cardStyles = ["", "border-zinc-800", "border-green-900/40 bg-[#0d120d]", "border-pink-900/40 bg-[#120d11]", "border-orange-700/50 bg-[#14100d]", "border-red-600 bg-[#1a0a0a] shadow-[0_0_25px_rgba(220,38,38,0.2)]"];
            const tagStyles = ["", "bg-zinc-800", "bg-green-600", "bg-pink-600", "bg-orange-600", "bg-red-600"];

            items.forEach(item => {
                const isB = item.status === 'bought';
                container.insertAdjacentHTML('beforeend', `
                    <div class="p-5 mb-5 rounded-[2.5rem] border transition-all active:scale-95 ${isB ? 'opacity-20 grayscale' : cardStyles[item.priority]}">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <span class="${tagStyles[item.priority]} text-[7px] px-3 py-1 rounded-full font-black uppercase tracking-tighter text-white">Priority ${item.priority}</span>
                                <h3 class="font-bold text-lg mt-2 text-white">${item.name}</h3>
                                <p class="text-xs font-black text-zinc-400 mt-1">${formatMoney(item.price)} VNĐ</p>
                                <p class="text-[8px] text-zinc-600 mt-2 uppercase font-bold tracking-widest italic">${timeAgo(item.createdAt)}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="updateStatus('gifts', '${item.id}', '${isB?'pending':'bought'}')" class="w-10 h-10 bg-white/5 rounded-2xl border border-white/10 flex items-center justify-center text-lg">${isB?'🔄':'💃'}</button>
                                <button onclick="deleteItem('gifts', '${item.id}')" class="w-10 h-10 bg-white/5 rounded-2xl border border-white/10 flex items-center justify-center">🗑️</button>
                            </div>
                        </div>
                    </div>`);
            });
        });

        // TƯƠNG TỰ CHO FOOD
        window.selectFoodP = (v) => {
            foodP = v;
            document.querySelectorAll('.food-p-btn').forEach(b => b.classList.remove('active-food-p'));
            document.getElementById('fp-'+v).classList.add('active-food-p');
        };

        window.addFood = () => {
            const name = document.getElementById('fName').value;
            if(!name) return;
            confetti({ particleCount: 50, spread: 80, origin: { y: 0.8 }, shapes: [confetti.shapeFromText({ text: '🍗', scalar: 3 })] });
            push(foodRef, { name, image: base64FoodImage, priority: foodP, status: 'pending', createdAt: Date.now() });
            document.getElementById('fName').value = ""; document.getElementById('fPrev').innerHTML = ""; base64FoodImage = "";
        };

        onValue(foodRef, (s) => {
            const container = document.getElementById('fList'); container.innerHTML = "";
            const data = s.val(); if(!data) return;
            const items = Object.keys(data).map(k => ({id: k, ...data[k]})).sort((a,b) => b.createdAt - a.createdAt);
            const foodEmojis = ["", "🍿", "🥤", "🍕", "🔥"];

            items.forEach(item => {
                const isD = item.status === 'done';
                container.insertAdjacentHTML('beforeend', `
                    <div class="p-4 mb-4 rounded-[2rem] bg-[#0d0d0d] border border-zinc-900 ${isD ? 'opacity-20' : ''}">
                        <div class="flex items-center gap-4">
                            <div class="text-2xl">${foodEmojis[item.priority]}</div>
                            ${item.image ? `<img src="${item.image}" class="w-14 h-14 rounded-2xl object-cover border border-zinc-800">` : ''}
                            <div class="flex-1">
                                <h3 class="font-bold text-white text-base">${item.name}</h3>
                                <p class="text-[8px] text-zinc-600 uppercase font-black tracking-widest">${timeAgo(item.createdAt)}</p>
                            </div>
                            <button onclick="updateStatus('foods', '${item.id}', '${isD?'pending':'done'}')" class="w-9 h-9 bg-white/5 rounded-xl flex items-center justify-center border border-white/10 transition-all active:scale-75">${isD?'🔄':'✅'}</button>
                        </div>
                    </div>`);
            });
        });

        window.updateStatus = (path, id, status) => update(ref(db, `${path}/${id}`), { status });
        window.deleteItem = (path, id) => { if(confirm("Xoá nha?")) remove(ref(db, `${path}/${id}`)); };
        window.handleFile = (e) => { const file = e.target.files[0]; if(file){ const r = new FileReader(); r.onload = (ev) => { base64FoodImage = ev.target.result; document.getElementById('fPrev').innerHTML = `<img src="${base64FoodImage}" class="w-full h-32 object-cover rounded-3xl mb-4 border border-orange-500/30">`; }; r.readAsDataURL(file); } };
    </script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        input, select { background: #0c0c0c !important; border: 1px solid #1a1a1a !important; color: white !important; outline: none; }
        input:focus { border-color: #ff1493 !important; }
        .gift-p-btn { background: #0a0a0a; border: 1px solid #141414; color: #444; border-radius: 1.2rem; transition: 0.3s; font-weight: 900; }
        .active-gift-p { border-color: #ff1493 !important; color: #fff !important; transform: scale(1.05); }
        .food-p-btn { filter: grayscale(1); transition: 0.3s; font-size: 1.5rem; }
        .active-food-p { filter: grayscale(0); transform: scale(1.4); }
        .active-tab { color: #ff1493 !important; border-top: 2px solid #ff1493 !important; }
        button:active { transform: scale(0.8); }
    </style>
</head>
<body class="pb-32 flex justify-center">
    <div class="w-full max-w-sm px-4">
        
        <div id="wTab" class="tab-content">
            <div class="text-center py-10">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter">Bói Boi Wishlist 🧚‍♀️</h1>
                <p class="text-[8px] text-zinc-600 mt-2 font-black uppercase tracking-[0.3em]">Luxury Personal Assistant</p>
            </div>
            
            <div class="bg-[#080808] p-6 rounded-[2.5rem] border border-zinc-900 mb-10 shadow-2xl">
                <div class="space-y-4">
                    <input type="text" id="gName" placeholder="Tên món quà ước mơ..." class="w-full p-4 rounded-2xl text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="gCat" class="w-full p-4 rounded-2xl text-[10px] font-black uppercase">
                            <option>👩‍❤️‍👨 Quà Đôi</option><option>👕 Thời Trang</option><option>💻 Công Nghệ</option><option>⚽ Thể Thao</option>
                        </select>
                        <input type="text" id="gPrice" oninput="inputFormat(this)" placeholder="Giá (VNĐ)..." class="w-full p-4 rounded-2xl text-sm font-bold text-pink-500">
                    </div>
                    <div class="grid grid-cols-5 gap-2">
                        <button onclick="selectGiftP(1)" id="gp-1" class="gift-p-btn active-gift-p py-3 text-[9px]">1</button>
                        <button onclick="selectGiftP(2)" id="gp-2" class="gift-p-btn py-3 text-[9px]">2</button>
                        <button onclick="selectGiftP(3)" id="gp-3" class="gift-p-btn py-3 text-[9px]">3</button>
                        <button onclick="selectGiftP(4)" id="gp-4" class="gift-p-btn py-3 text-[9px]">4</button>
                        <button onclick="selectGiftP(5)" id="gp-5" class="gift-p-btn py-3 text-[9px] text-red-600 font-black">5</button>
                    </div>
                    <input type="text" id="gLink" placeholder="Link sản phẩm (nếu có)..." class="w-full p-4 rounded-2xl text-xs">
                    <button onclick="addGift()" class="w-full py-5 bg-pink-600 text-white rounded-[2rem] font-black text-xs uppercase shadow-lg transition-all">🚀 THÊM VÀO GIỎ ƯỚC 💖</button>
                </div>
            </div>
            <div id="wList"></div>
        </div>

        <div id="fTab" class="tab-content hidden">
            <div class="text-center py-10"><h1 class="text-3xl font-black italic uppercase text-orange-500">Ăn Gì Boi Ơi 🍗</h1></div>
            <div class="bg-[#080808] p-6 rounded-[2.5rem] border border-zinc-900 mb-10">
                <div class="space-y-4">
                    <input type="text" id="fName" placeholder="Hôm nay thèm gì..." class="w-full p-4 rounded-2xl text-sm">
                    <div id="fPrev"></div>
                    <label class="w-full p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800 flex justify-center items-center text-[10px] text-zinc-500 uppercase font-black cursor-pointer"><i class="fas fa-camera mr-2"></i> Chụp ảnh món ăn<input type="file" accept="image/*" class="hidden" onchange="handleFile(event)"></label>
                    <div class="flex justify-around py-2">
                        <button onclick="selectFoodP(1)" id="fp-1" class="food-p-btn active-food-p">🍿</button>
                        <button onclick="selectFoodP(2)" id="fp-2" class="food-p-btn">🥤</button>
                        <button onclick="selectFoodP(3)" id="fp-3" class="food-p-btn">🍕</button>
                        <button onclick="selectFoodP(4)" id="fp-4" class="food-p-btn">🔥</button>
                    </div>
                    <button onclick="addFood()" class="w-full py-5 bg-orange-600 text-white rounded-[2rem] font-black text-xs uppercase">🛎️ BẮN TÍN HIỆU NGAY</button>
                </div>
            </div>
            <div id="fList"></div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 h-24 bg-black/90 backdrop-blur-2xl border-t border-zinc-900 flex justify-around items-center px-10 z-50">
            <button onclick="switchTab('wTab')" class="tab-btn active-tab flex flex-col items-center gap-1 text-pink-500 transition-all active:scale-75"><i class="fas fa-crown text-xl"></i><span class="text-[7px] font-black uppercase tracking-widest">Wishlist</span></button>
            <button onclick="switchTab('fTab')" class="tab-btn flex flex-col items-center gap-1 text-zinc-600 transition-all active:scale-75"><i class="fas fa-hamburger text-xl"></i><span class="text-[7px] font-black uppercase tracking-widest">Food</span></button>
        </div>
    </div>
</body>
</html>
