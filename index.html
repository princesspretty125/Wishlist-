<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist của Bòi Bói Boi 🫃🏻</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #000; --card: #121212; --text: #fff; --gray: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; }
        h1 { font-weight: 800; font-size: 24px; text-align: center; margin-bottom: 5px; background: linear-gradient(to right, #ff85a2, #ff2d55); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { text-align: center; font-size: 10px; color: var(--gray); letter-spacing: 1px; margin-bottom: 30px; text-transform: uppercase; }
        .input-card { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { font-size: 10px; font-weight: 600; color: var(--gray); display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100%; background: #1a1a1a; border: 1px solid #222; border-radius: 12px; padding: 12px; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .row { display: flex; gap: 10px; }
        .select-wrapper { position: relative; flex: 1.5; }
        .select-wrapper::after { content: "▼"; font-size: 9px; position: absolute; right: 12px; top: 15px; color: var(--gray); pointer-events: none; }
        .priority-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .p-btn { background: #1a1a1a; border: 1px solid #222; padding: 14px; border-radius: 12px; color: var(--gray); text-align: left; cursor: pointer; transition: 0.3s; font-weight: 600; }
        
        .p-btn[data-l="1"].active { border-color: #4D96FF; color: #4D96FF; background: rgba(77, 150, 255, 0.1); }
        .p-btn[data-l="2"].active { border-color: #6BCB77; color: #6BCB77; background: rgba(107, 203, 119, 0.1); }
        .p-btn[data-l="3"].active { border-color: #ffd93d; color: #ffd93d; background: rgba(255, 217, 61, 0.1); }
        .p-btn[data-l="4"].active { border-color: #ff85a2; color: #ff85a2; background: rgba(255, 133, 162, 0.1); }
        .p-btn[data-l="5"].active { border-color: #ff4d4d; color: #ff4d4d; background: rgba(255, 77, 77, 0.1); }

        .add-btn { width: 100%; background: #fff; color: #000; border: none; padding: 16px; border-radius: 30px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .add-btn.success { background: #ff2d55; color: #fff; transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 45, 85, 0.6); }

        h2 { font-size: 18px; margin-bottom: 20px; font-style: italic; }
        .item { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid transparent; transition: 0.5s; position: relative; }
        .item.new { animation: flash 2s ease; }
        @keyframes flash { 0% { background: #2a2a2a; } 100% { background: var(--card); } }
        .item.done { opacity: 0.3; filter: grayscale(1); }
        .item h3 { margin: 0 0 5px 0; font-size: 18px; }
        .item p { color: #ff2d55; margin: 0; font-weight: 600; font-size: 14px; }
        .badge { font-size: 9px; padding: 3px 8px; border-radius: 5px; color: white; display: inline-block; margin-bottom: 5px; font-weight: bold; }
        .actions { display: flex; gap: 8px; }
        .actions button { background: #222; border: none; border-radius: 10px; padding: 10px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div class="app">
    <h1>Wishlist của Bòi Bói Boi 🫃🏻</h1>
    <p class="sub">THÊM MÓN QUÀ ANH THÍCH VÀO ĐÂY NHOÉEEE 💌</p>

    <div class="input-card">
        <label>❤️ TÊN QUÀ TẶNG</label>
        <input type="text" id="name" placeholder="Tên món quà...">

        <div class="row">
            <div class="select-wrapper">
                <label>📂 DANH MỤC</label>
                <select id="cate">
                    <option>💕 Lãng Mạn</option><option>👕 Thời Trang</option><option>💻 Công Nghệ</option><option>🏍️ Xe cộ</option>
                </select>
            </div>
            <div style="flex:1">
                <label>$ GIÁ ƯỚC TÍNH</label>
                <input type="text" id="price" placeholder="500,000" onkeyup="fmt(this)">
            </div>
        </div>

        <label>🔥 ĐỘ ƯU TIÊN</label>
        <div class="priority-group">
            <button class="p-btn" data-l="1">💬 FOMO</button>
            <button class="p-btn" data-l="2">🌷 Thích nha</button>
            <button class="p-btn" data-l="3">🥺 Muốn lắm</button>
            <button class="p-btn" data-l="4">💕 Cần rồi</button>
            <button class="p-btn" data-l="5">🔥 PHẢI CÓ</button>
        </div>

        <label>📝 GHI CHÚ</label>
        <textarea id="note" placeholder="Màu sắc, kích thước..."></textarea>

        <button id="addBtn" class="add-btn">🚀 THÊM VÀO WISHLIST</button>
    </div>

    <h2 id="targetScroll">Danh sách ước mơ 🦋</h2>
    <div id="list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.firebasestorage.app",
  messagingSenderId: "821194575297",
  appId: "1:821194575297:web:185b7837e6cdee4783f340",
  measurementId: "G-RHE1QBW9WX" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, "gifts");

    let selP = null;
    const colors = ["", "#4D96FF", "#6BCB77", "#ffd93d", "#ff85a2", "#ff4d4d"];

    document.querySelectorAll('.p-btn').forEach(btn => {
        btn.onclick = function() {
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selP = { lv: parseInt(this.dataset.l), txt: this.innerText, clr: colors[this.dataset.l] };
        };
    });

    window.fmt = (i) => { i.value = i.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ","); };

    function shoot() {
        const icons = ['🎁', '💖', '✨', '⭐', '🎈'];
        icons.forEach((icon, index) => {
            setTimeout(() => {
                confetti({
                    particleCount: 15,
                    spread: 70,
                    origin: { y: 0.8 },
                    shapes: [confetti.shapeFromText({ text: icon, scalar: 2 })],
                    ticks: 200
                });
            }, index * 100);
        });
    }

    document.getElementById('addBtn').onclick = function() {
        const n = document.getElementById('name').value;
        if(!n || !selP) return alert("Chọn độ ưu tiên nữa má!");
        
        const btn = this;
        push(dbRef, { name: n, price: document.getElementById('price').value || "0", cate: document.getElementById('cate').value, p: selP, note: document.getElementById('note').value, status: 'wait', time: Date.now() }).then(() => {
            shoot();
            btn.classList.add('success');
            setTimeout(() => { 
                btn.classList.remove('success');
                document.getElementById('targetScroll').scrollIntoView({ behavior: 'smooth' });
            }, 600);
            document.getElementById('name').value = ""; document.getElementById('note').value = "";
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
            selP = null;
        });
    };

    onValue(dbRef, (s) => {
        const data = s.val(); const arr = [];
        for (let id in data) arr.push({ id, ...data[id] });
        
        // SORT: Phải có (5) -> FOMO (1)
        arr.sort((a, b) => b.p.lv - a.p.lv);
        
        document.getElementById('list').innerHTML = arr.map(i => `
            <div class="item ${i.status=='done'?'done':''}" style="border-left-color: ${i.p.clr}">
                <div>
                    <span class="badge" style="background:${i.p.clr}">${i.p.txt}</span>
                    <h3>${i.name}</h3>
                    <p>${i.price}đ • ${i.cate}</p>
                    <small style="color:#666">${i.note || ''}</small>
                </div>
                <div class="actions">
                    <button onclick="editS('${i.id}','${i.status}')">✅</button>
                    <button onclick="del('${i.id}')">🗑️</button>
                </div>
            </div>
        `).join('');
    });

    window.editS = (id, s) => update(ref(db, `gifts/${id}`), { status: s=='done'?'wait':'done' });
    window.del = (id) => confirm("Xóa nhé?") && remove(ref(db, `gifts/${id}`));
</script>
</body>
</html>
