<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Bòi Bói Boi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-
        const firebaseConfig = {
            apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.firebasestorage.app",
  messagingSenderId: "821194575297",
  appId: "1:821194575297:web:185b7837e6cdee4783f340",
  measurementId: "G-RHE1QBW9WX"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const giftCol = collection(db, "gifts");

        window.currentPrio = 'Muốn lắm';
        window.selectPrio = (prio, btn) => {
            window.currentPrio = prio;
            document.querySelectorAll('.prio-btn').forEach(b => {
                b.classList.remove('border-pink-500', 'bg-[#3a2226]');
                b.classList.add('border-[#333]', 'bg-[#2a2a2a]');
            });
            btn.classList.add('border-pink-500', 'bg-[#3a2226]');
        };

        window.addGift = async () => {
            const name = document.getElementById('gName').value;
            const price = document.getElementById('gPrice').value;
            if(!name || !price) return alert("Điền đủ mới cho thêm nha!");
            await addDoc(giftCol, { name, price, prio: window.currentPrio, date: new Date() });
            document.getElementById('gName').value = '';
            document.getElementById('gPrice').value = '';
        };

        onSnapshot(query(giftCol, orderBy("date", "desc")), (s) => {
            const div = document.getElementById('list');
            div.innerHTML = '';
            s.forEach(d => {
                const i = d.data();
                div.innerHTML += `<div class="bg-[#1a1a1a] p-4 rounded-2xl mb-3 flex justify-between border border-[#222]">
                    <div><div class="font-bold">${i.name}</div><div class="text-xs text-pink-400">${i.prio}</div></div>
                    <div class="text-yellow-500 font-bold">${Number(i.price).toLocaleString()}đ</div>
                </div>`;
            });
        });
    </script>
</head>
<body class="bg-[#111] text-white p-5 font-sans">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-pink-300">🌹 Wishlist của Bòi Bói Boi🫃🏻</h1>
            <p class="text-gray-500 text-xs">Thêm món quà anh thích vào đây nhoéeee 💌</p>
        </div>

        <div class="bg-[#1a1a1a] p-6 rounded-[30px] border border-[#222] space-y-4">
            <div>
                <p class="text-pink-300 text-[10px] font-bold mb-2">💖 TÊN QUÀ TẶNG</p>
                <input id="gName" class="w-full bg-[#2a2a2a] p-3 rounded-xl border border-[#333] outline-none" placeholder="Vòng tay bạc...">
            </div>
            <div>
                <p class="text-pink-300 text-[10px] font-bold mb-2">💰 GIÁ (VNĐ)</p>
                <input id="gPrice" type="number" class="w-full bg-[#2a2a2a] p-3 rounded-xl border border-[#333] outline-none" placeholder="500,000">
            </div>
            <div>
                <p class="text-pink-300 text-[10px] font-bold mb-2">ĐỘ ƯU TIÊN</p>
                <div class="flex gap-2">
                    <button onclick="selectPrio('Thích nha', this)" class="prio-btn flex-1 p-2 rounded-xl border border-[#333] bg-[#2a2a2a] text-[10px]">🌹 Thích nha</button>
                    <button onclick="selectPrio('Muốn lắm', this)" class="prio-btn flex-1 p-2 rounded-xl border border-pink-500 bg-[#3a2226] text-[10px]">🥺 Muốn lắm</button>
                    <button onclick="selectPrio('Phải có', this)" class="prio-btn flex-1 p-2 rounded-xl border border-[#333] bg-[#2a2a2a] text-[10px]">🔥 Phải có</button>
                </div>
            </div>
            <button onclick="addGift()" class="w-full bg-pink-500 py-4 rounded-full font-bold">Thêm vào danh sách ❤️</button>
        </div>

        <div id="list" class="mt-8"></div>
    </div>
</body>
</html>
