<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wishlist của Bòi Bói Boi🫃🏻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.firebasestorage.app",
  messagingSenderId: "821194575297",
  appId: "1:821194575297:web:185b7837e6cdee4783f340",
  measurementId: "G-RHE1QBW9WX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wishlistRef = ref(db, 'gifts');
        const foodRef = ref(db, 'foods');

        let giftP = 1;
        let foodP = 1;
        let base64FoodImage = "";

        window.switchTab = (tabName) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabName).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            const btn = event.currentTarget;
            btn.classList.add('active-tab');
        };

        window.selectGiftPriority = (v) => {
            giftP = v;
            document.querySelectorAll('.gift-p-btn').forEach(b => b.classList.remove('active-gift-p'));
            document.getElementById('gift-p-'+v).classList.add('active-gift-p');
        };

        window.addGift = () => {
            const name = document.getElementById('giftName').value;
            if(!name) return;
            
            const scalar = 2;
            const giftEmoji = confetti.shapeFromText({ text: '🎁', scalar });
            const heartEmoji = confetti.shapeFromText({ text: '💖', scalar });
            confetti({ shapes: [giftEmoji, heartEmoji], particleCount: 40, spread: 70, origin: { y: 0.7 } });

            push(wishlistRef, { 
                name, 
                category: document.getElementById('giftCat').value, 
                price: document.getElementById('giftPrice').value, 
                link: document.getElementById('giftLink').value, 
                note: document.getElementById('giftNote').value, 
                priority: giftP, 
                status: 'pending', 
                createdAt: Date.now() 
            });
            
            // Reset
            ['giftName', 'giftPrice', 'giftLink', 'giftNote'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('giftCat').selectedIndex = 0;
            selectGiftPriority(1);
        };

        onValue(wishlistRef, (s) => {
            const container = document.getElementById('wishlistContainer');
            container.innerHTML = "";
            const data = s.val();
            if(data) {
                const items = Object.keys(data).map(k => ({id: k, ...data[k]})).sort((a,b) => b.priority - a.priority);
                const labels = ["", "💬 FOMO", "🌷 Thích nha", "🙄 Muốn lắm", "💕 Cần rồi", "🔥 PHẢI CÓ"];
                const styles = ["", "bg-zinc-800 text-zinc-500", "bg-zinc-800 text-zinc-400", "bg-zinc-700 text-zinc-200", "bg-pink-500/20 text-pink-400", "bg-pink-600 text-white"];
                items.forEach(item => {
                    const isB = item.status === 'bought';
                    container.insertAdjacentHTML('beforeend', `
                        <div class="p-6 mb-4 rounded-[2.5rem] bg-[#0d0d0d] border border-zinc-900 ${isB ? 'opacity-30 grayscale scale-95' : ''}">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <span class="text-[9px] px-3 py-1 rounded-full font-black ${styles[item.priority]} uppercase">${labels[item.priority]}</span>
                                    <h3 class="font-black text-xl mt-3 text-white">${item.name}</h3>
                                    <div class="text-[10px] text-zinc-500 mt-1 uppercase font-bold tracking-widest">💘 ${item.category} • ${item.price} VNĐ</div>
                                    ${item.link ? `<a href="${item.link}" target="_blank" class="inline-block mt-3 text-[9px] font-bold text-blue-500 underline uppercase italic">🔗 Xem link</a>` : ''}
                                </div>
                                <div class="flex flex-col gap-2 ml-4">
                                    <button onclick="updateStatus('gifts', '${item.id}', '${isB?'pending':'bought'}')" class="w-11 h-11 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-800 active:scale-75 transition-all">${isB?'🔄':'💃'}</button>
                                    <button onclick="deleteItem('gifts', '${item.id}')" class="w-11 h-11 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-800 active:scale-75">🗑️</button>
                                </div>
                            </div>
                        </div>`);
                });
            }
        });

        window.selectFoodPriority = (v) => {
            foodP = v;
            document.querySelectorAll('.food-p-btn').forEach(b => b.classList.remove('active-food-p'));
            document.getElementById('food-p-'+v).classList.add('active-food-p');
        };

        window.handleFoodFile = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64FoodImage = e.target.result;
                    document.getElementById('foodPreview').innerHTML = `<img src="${base64FoodImage}" class="w-full h-32 object-cover rounded-[1.5rem] mb-3">`;
                };
                reader.readAsDataURL(file);
            }
        };

        window.addFood = () => {
            const name = document.getElementById('foodName').value;
            if(!name) return;
            
            // Bắn đồ ăn
            const scalar = 2;
            const f1 = confetti.shapeFromText({ text: '🍕', scalar });
            const f2 = confetti.shapeFromText({ text: '🍟', scalar });
            const f3 = confetti.shapeFromText({ text: '🍗', scalar });
            confetti({ shapes: [f1, f2, f3], particleCount: 40, spread: 60, origin: { y: 0.8 } });

            push(foodRef, { name, image: base64FoodImage, note: document.getElementById('foodNote').value, priority: foodP, status: 'pending', createdAt: Date.now() });
            
            document.getElementById('foodName').value = "";
            document.getElementById('foodNote').value = "";
            document.getElementById('foodPreview').innerHTML = "";
            base64FoodImage = "";
            selectFoodPriority(1);
        };

        onValue(foodRef, (s) => {
            const container = document.getElementById('foodContainer');
            container.innerHTML = "";
            const data = s.val();
            if(data) {
                const items = Object.keys(data).map(k => ({id: k, ...data[k]})).sort((a,b) => b.createdAt - a.createdAt);
                const labels = ["", "🍿 Vui", "🥤 Khát", "🍕 Đói", "🔥 Thèm"];
                items.forEach(item => {
                    const isD = item.status === 'done';
                    container.insertAdjacentHTML('beforeend', `
                        <div class="p-4 mb-4 rounded-[2rem] bg-[#0d0d0d] border border-zinc-900 ${isD ? 'opacity-30' : ''}">
                            <div class="flex items-center gap-4">
                                ${item.image ? `<img src="${item.image}" class="w-16 h-16 rounded-2xl object-cover border border-zinc-800">` : ''}
                                <div class="flex-1">
                                    <span class="text-[8px] px-2 py-0.5 rounded-full bg-orange-900/20 text-orange-500 font-bold uppercase">${labels[item.priority]}</span>
                                    <h3 class="font-bold text-lg text-white mt-1 italic">${item.name}</h3>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <button onclick="updateStatus('foods', '${item.id}', '${isD?'pending':'done'}')" class="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-800 active:scale-75">${isD?'🔄':'✅'}</button>
                                    <button onclick="deleteItem('foods', '${item.id}')" class="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-800 active:scale-75">🗑️</button>
                                </div>
                            </div>
                        </div>`);
                });
            }
        });

        window.updateStatus = (path, id, status) => update(ref(db, `${path}/${id}`), { status });
        window.deleteItem = (path, id) => { if(confirm("Xoá nha?")) remove(ref(db, `${path}/${id}`)); };
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-main { background: #080808; border: 1px solid #111; border-radius: 2.5rem; }
        input, select, textarea { background-color: #0c0c0c !important; border: 1px solid #181818 !important; color: white !important; outline: none; }
        .gift-p-btn { background: #0a0a0a; border: 1px solid #151515; color: #444; border-radius: 1.2rem; transition: 0.2s; font-weight: 900; }
        .active-gift-p { border-color: #ff1493 !important; color: #fff !important; background: #111; transform: scale(1.02); }
        .food-p-btn { filter: grayscale(1); transition: 0.2s; }
        .active-food-p { filter: grayscale(0); transform: scale(1.2); }
        .active-tab { color: #ff1493 !important; border-top: 2px solid #ff1493 !important; }
    </style>
</head>
<body class="pb-32 flex justify-center">
    <div class="w-full max-w-sm px-4">
        
        <div id="wishlistTab" class="tab-content">
            <div class="text-center my-10"><h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">Wishlist Bòi Bói 💖</h1></div>
            <div class="card-main p-6 shadow-xl mb-10"><div class="space-y-5">
                <div><label class="text-[9px] font-black text-zinc-600 uppercase italic ml-2">Tên quà</label><input type="text" id="giftName" placeholder="..." class="w-full p-4 rounded-2xl mt-1 text-sm"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[9px] font-black text-zinc-600 uppercase italic ml-2">Loại</label><select id="giftCat" class="w-full p-4 rounded-2xl mt-1 text-xs font-bold"><option>👩‍❤️‍👨 Quà Đôi</option><option>👕 Thời Trang</option><option>💻 Công Nghệ</option><option>⚽ Thể Thao</option></select></div>
                    <div><label class="text-[9px] font-black text-zinc-600 uppercase italic ml-2">Giá</label><input type="text" id="giftPrice" placeholder="..." class="w-full p-4 rounded-2xl mt-1 text-sm font-black"></div>
                </div>
                <div><label class="text-[9px] font-black text-zinc-600 uppercase italic block mb-3">Ưu tiên</label><div class="space-y-2">
                    <button onclick="selectGiftPriority(1)" id="gift-p-1" class="gift-p-btn active-gift-p w-full py-3.5 uppercase text-[10px]">💬 FOMO</button>
                    <button onclick="selectGiftPriority(2)" id="gift-p-2" class="gift-p-btn w-full py-3.5 uppercase text-[10px]">🌷 Thích</button>
                    <button onclick="selectGiftPriority(3)" id="gift-p-3" class="gift-p-btn w-full py-3.5 uppercase text-[10px]">🙄 Muốn</button>
                    <button onclick="selectGiftPriority(4)" id="gift-p-4" class="gift-p-btn w-full py-3.5 uppercase text-[10px]">💕 Cần</button>
                    <button onclick="selectGiftPriority(5)" id="gift-p-5" class="gift-p-btn w-full py-3.5 uppercase text-[10px] text-pink-500">🔥 PHẢI CÓ</button>
                </div></div>
                <div><label class="text-[9px] font-black text-zinc-600 uppercase italic ml-2">Link/Ghi chú</label><input type="text" id="giftLink" placeholder="Link..." class="w-full p-4 rounded-2xl mt-1 text-sm mb-2"><textarea id="giftNote" placeholder="Ghi chú..." class="w-full p-4 rounded-2xl h-24 resize-none text-sm"></textarea></div>
                <button onclick="addGift()" class="w-full py-5 bg-pink-600 text-white rounded-[2rem] font-black text-xs tracking-widest active:scale-90 transition-all uppercase">🚀 Thêm quà ngay</button>
            </div></div>
            <div id="wishlistContainer"></div>
        </div>

        <div id="foodTab" class="tab-content hidden">
            <div class="text-center my-10"><h1 class="text-3xl font-black italic text-orange-500 tracking-tighter uppercase leading-none">Thèm Gì Ăn Nấy 🍗</h1></div>
            <div class="card-main p-6 shadow-xl mb-10"><div class="space-y-5">
                <input type="text" id="foodName" placeholder="Tên món..." class="w-full p-4 rounded-2xl text-sm">
                <div id="foodPreview"></div>
                <label class="flex items-center justify-center w-full p-4 rounded-2xl bg-zinc-900/50 border border-zinc-800 text-zinc-500 text-xs cursor-pointer active:scale-95"><i class="fas fa-camera mr-2"></i> Ảnh món ăn<input type="file" accept="image/*" class="hidden" onchange="handleFoodFile(event)"></label>
                <div class="flex justify-around bg-zinc-900/30 p-3 rounded-2xl">
                    <button onclick="selectFoodPriority(1)" id="food-p-1" class="food-p-btn active-food-p text-xl">🍿</button>
                    <button onclick="selectFoodPriority(2)" id="food-p-2" class="food-p-btn text-xl">🥤</button>
                    <button onclick="selectFoodPriority(3)" id="food-p-3" class="food-p-btn text-xl">🍕</button>
                    <button onclick="selectFoodPriority(4)" id="food-p-4" class="food-p-btn text-xl">🔥</button>
                </div>
                <textarea id="foodNote" placeholder="Dặn dò gì không..." class="w-full p-4 rounded-2xl h-20 resize-none text-sm"></textarea>
                <button onclick="addFood()" class="w-full py-5 bg-orange-600 text-white rounded-[2rem] font-black text-xs tracking-widest active:scale-90 transition-all uppercase">🛎️ Bắn tín hiệu</button>
            </div></div>
            <div id="foodContainer"></div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 h-24 bg-[#050505]/95 backdrop-blur-xl border-t border-zinc-900 flex justify-around items-center px-8 z-50">
            <button onclick="switchTab('wishlistTab')" class="tab-btn active-tab flex flex-col items-center gap-1 text-pink-400 pt-2"><i class="fas fa-heart text-xl"></i><span class="text-[8px] font-black uppercase">Wishlist</span></button>
            <button onclick="switchTab('foodTab')" class="tab-btn flex flex-col items-center gap-1 text-zinc-600 pt-2"><i class="fas fa-utensils text-xl"></i><span class="text-[8px] font-black uppercase">Ăn uống</span></button>
        </div>
    </div>
</body>
</html>
