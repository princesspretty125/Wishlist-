<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wislist của Bòi Bói Boi🫃🏻</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#2a0a12,#000);
  color:white;
}

.header{
  padding:25px 20px 10px;
  font-family:'Playfair Display';
  font-size:24px;
  color:#ff6b9d;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.card{
  background:#111;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.section{
  font-size:12px;
  color:#888;
  margin-top:10px;
}

input,textarea,select{
  width:100%;
  margin-top:8px;
  padding:13px;
  border-radius:14px;
  border:none;
  background:#1c1c1c;
  color:white;
}

.priority{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.priority div{
  flex:1;
  padding:10px;
  border-radius:12px;
  background:#222;
  text-align:center;
}

.activeP{
  background:#ff4f87;
}

button{
  width:100%;
  margin-top:14px;
  padding:13px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#ff4f87,#ff8fb1);
  color:white;
  font-weight:600;
}

.item{
  background:#111;
  border-radius:18px;
  padding:14px;
  margin-top:12px;
}

.title{
  font-weight:600;
}

.meta{
  font-size:12px;
  color:#aaa;
  margin-top:3px;
}

img{
  width:100%;
  border-radius:12px;
  margin-top:8px;
}

.actions{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.actions button{
  flex:1;
  font-size:12px;
  background:#222;
}

.buy{
  background:#ff4f87 !important;
}

.done{
  opacity:0.5;
  text-decoration:line-through;
}
</style>
</head>

<body>

<div class="header">🌹 Wislist của Bòi Bói Boi🫃🏻</div>

<div class="container">

<div class="card">

<div class="section">Thông tin</div>
<input id="name">
<input id="price">

<div class="section">Hình & Link</div>
<input id="image">
<input id="link">

<div class="section">Phân loại</div>
<select id="category">
<option>💖 Lãng mạn</option>
<option>👕 Thời trang</option>
<option>💻 Công nghệ</option>
<option>🎁 Khác</option>
</select>

<div class="section">Ghi chú</div>
<textarea id="note"></textarea>

<div class="section">Mức độ</div>
<div class="priority">
<div onclick="setP(this,1)">🤍</div>
<div onclick="setP(this,2)">💗</div>
<div onclick="setP(this,3)">💖</div>
<div onclick="setP(this,4)">🔥</div>
</div>

<button onclick="addItem()">➕ Thêm</button>

</div>

<div id="list"></div>

</div>

<script>
let items = JSON.parse(localStorage.getItem("fix")) || [];
let priority = 1;

function get(id){
  return document.getElementById(id);
}

function save(){
  localStorage.setItem("fix", JSON.stringify(items));
}

function setP(el,p){
  priority=p;
  document.querySelectorAll(".priority div").forEach(x=>x.classList.remove("activeP"));
  el.classList.add("activeP");
}

function render(){
  let list=get("list");
  list.innerHTML="";

  items.forEach((item,i)=>{
    let div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <div class="${item.done?'done':''}">
        <div class="title">${item.name}</div>
        <div class="meta">${item.category} • ${item.price}</div>
        <div class="meta">${item.note||""}</div>
        ${item.image?`<img src="${item.image}">`:""}
      </div>

      <div class="actions">
        <button class="buy" onclick="openLink('${item.link}')">🛒</button>
        <button onclick="toggle(${i})">✔️</button>
        <button onclick="del(${i})">❌</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function addItem(){
  let name=get("name").value;
  if(!name) return alert("Nhập quà 😾");

  items.push({
    name,
    price:get("price").value,
    image:get("image").value,
    link:get("link").value,
    category:get("category").value,
    note:get("note").value,
    priority,
    done:false
  });

  save();
  render();

  ["name","price","image","link","note"].forEach(id=>get(id).value="");
}

function del(i){
  items.splice(i,1);
  save();
  render();
}

function toggle(i){
  items[i].done=!items[i].done;
  save();
  render();
}

function openLink(link){
  if(link) window.open(link);
}

render();
</script>

</body>
</html>
